<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>접근 거부 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .error-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,.08);
        }
    </style>
</head>
<body>

<div class="container text-center mt-5">
    <div class="card error-card p-5">
        <h1 class="text-danger fw-bold">403 접근 거부</h1>
        <p class="mt-3 fs-5">관리자 권한이 필요한 페이지입니다.</p>
        <p class="text-muted">일반 사용자 계정으로는 상품 수정 화면에 접근할 수 없습니다.</p>
        <a th:href="@{/products}" class="btn btn-primary mt-3">상품 목록으로 이동</a>
    </div>
</div>

<footer class="text-center text-muted mt-5 mb-3">
    <hr>
    <p>
        실습 수행 일시:
        <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
        │ 학번: 2191173 │ 성명: 김용민
    </p>
</footer>

</body>
</html>
