<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .form-card { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container" style="max-width: 720px;">
    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">상품 수정</h4>
        <small class="text-muted">기존 상품 정보를 수정합니다. 관리자 전용 기능입니다.</small>
    </div>

    <div class="card form-card">
        <div class="card-body p-4">
            <form th:action="@{/products/{id}/edit(id=${productId})}"
                  th:object="${productDto}"
                  method="post">

                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">상품명</label>
                    <input type="text"
                           id="name"
                           th:field="*{name}"
                           class="form-control"
                           placeholder="상품명을 입력하세요">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label fw-semibold">가격</label>
                    <input type="number"
                           id="price"
                           th:field="*{price}"
                           class="form-control"
                           placeholder="가격을 입력하세요">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('price')}"
                         th:errors="*{price}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="stock" class="form-label fw-semibold">재고</label>
                    <input type="number"
                           id="stock"
                           th:field="*{stock}"
                           class="form-control"
                           placeholder="재고 수량을 입력하세요">
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('stock')}"
                         th:errors="*{stock}">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label fw-semibold">상품 설명</label>
                    <textarea id="description"
                              th:field="*{description}"
                              class="form-control"
                              rows="4"
                              placeholder="상품 설명을 입력하세요"></textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/products}" class="btn btn-outline-secondary">목록으로</a>
                    <button type="submit" class="btn btn-danger px-4">수정 저장</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="text-center text-muted mt-5 mb-3">
    <hr>
    <p>
        실습 수행 일시:
        <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
        │ 학번: 2191173 │ 성명: 김용민
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
